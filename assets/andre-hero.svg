<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Andre Lopez - Senior Full-Stack Web Developer</title>
  <desc id="desc">Animated GitHub profile banner for Andre Lopez</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06111F"/>
      <stop offset="42%" stop-color="#0B182E"/>
      <stop offset="100%" stop-color="#052E2B"/>
      <animate attributeName="x1" values="0;160;0" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="420;300;420" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="48%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.95 0 0 0 0 0.65 0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .orbit { transform-origin: 920px 194px; animation: orbit 15s linear infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .float { animation: float 5s ease-in-out infinite; }
      .dash { stroke-dasharray: 14 14; animation: dash 18s linear infinite; }
      .type { animation: type 5s steps(29) infinite; }
      .caret { animation: blink 1s steps(2, start) infinite; }
      @keyframes orbit { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { opacity: .55; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      @keyframes dash { to { stroke-dashoffset: -280; } }
      @keyframes type { 0%,12% { clip-path: inset(0 100% 0 0); } 45%,75% { clip-path: inset(0 0 0 0); } 100% { clip-path: inset(0 100% 0 0); } }
      @keyframes blink { 0%,45% { opacity: 1; } 46%,100% { opacity: 0; } }
    </style>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="30" fill="url(#grid)"/>
  <path class="dash" d="M55 334C179 248 268 373 382 287C499 198 561 326 690 221C805 128 876 236 1026 105C1078 60 1121 51 1160 55" stroke="url(#line)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <g opacity="0.95">
    <text x="70" y="100" class="mono" font-size="20" fill="#22C55E">anndreloopez012@github</text>
    <text x="70" y="166" class="sans" font-size="58" font-weight="800" fill="#F8FAFC">Andre Lopez</text>
    <text x="70" y="215" class="sans" font-size="30" font-weight="700" fill="#BAE6FD">Senior Full-Stack Web Developer</text>
    <g transform="translate(70 250)">
      <rect width="544" height="54" rx="14" fill="#020617" fill-opacity="0.72" stroke="#22C55E" stroke-opacity="0.45"/>
      <text x="22" y="35" class="mono type" font-size="22" fill="#DCFCE7">PHP + JavaScript + TypeScript</text>
      <rect class="caret" x="417" y="16" width="12" height="26" fill="#22C55E"/>
    </g>
    <text x="70" y="347" class="sans" font-size="22" fill="#CBD5E1">ALCORE | Guatemala | Web Apps | Cloudflare | Automation | Teaching</text>
  </g>

  <g class="float" filter="url(#glow)">
    <circle cx="920" cy="194" r="92" fill="#052E2B" stroke="url(#line)" stroke-width="3"/>
    <circle cx="920" cy="194" r="58" fill="#0F172A" stroke="#22C55E" stroke-opacity=".55" stroke-width="2"/>
    <path d="M884 198l22 22 52-62" stroke="#22C55E" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <circle class="orbit" cx="920" cy="76" r="10" fill="#22C55E"/>
    <circle class="orbit" cx="1036" cy="194" r="8" fill="#06B6D4"/>
    <circle class="orbit" cx="920" cy="312" r="7" fill="#A78BFA"/>
    <circle class="orbit" cx="804" cy="194" r="9" fill="#F8FAFC"/>
  </g>

  <g class="pulse" opacity=".95">
    <rect x="785" y="320" width="290" height="54" rx="14" fill="#020617" fill-opacity=".72" stroke="#38BDF8" stroke-opacity=".45"/>
    <circle cx="817" cy="347" r="7" fill="#22C55E"/>
    <text x="838" y="354" class="mono" font-size="18" fill="#E0F2FE">building production systems</text>
  </g>
</svg>
